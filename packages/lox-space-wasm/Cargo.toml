[package]
name = "lox-space-wasm"
version = "0.1.0"
authors = ["Lox Space Contributors"]
edition = "2021"
description = "WebAssembly bindings for Lox Space orbital mechanics"
license = "MPL-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
console_error_panic_hook = { version = "0.1", optional = true }
lox-space = { path = "../../crates/lox-space", default-features = false, features = ["orbits"] }

[features]
default = ["console_error_panic_hook"]
