name: Rust

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: all-features
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Cache itur wheel
        uses: actions/cache@v5
        with:
          path: itur-0.4.0-py2.py3-none-any.whl
          key: itur-wheel-0.4.0
      - name: Download itur wheel (if not cached)
        run: |
          test -f itur-0.4.0-py2.py3-none-any.whl \
            || python3 -m pip download --no-deps itur==0.4.0
      - name: Build lox-itur data bundle
        run: cargo run -p lox-itur --bin pack -- itur-0.4.0-py2.py3-none-any.whl target/lox-itur-data.npz
      - name: Run tests
        run: cargo nextest run --all-features --lib --bins --tests --examples
      - name: Run doctests
        run: cargo test --doc --all-features

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Enforce formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: all-features
      - uses: taiki-e/install-action@just
      - name: Linting
        run: just lint-clippy

  no-std-test:
    name: Test (no_std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: no-std
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run tests with no_std library
        run: cargo nextest run -p lox-core -p lox-test-utils -p lox-math -p lox-units -p lox-bodies -p lox-time --no-default-features --features libm

  no-std-check:
    name: Clippy (no_std, bare-metal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: no-std-baremetal
      - uses: taiki-e/install-action@just
      - name: Bare-metal lint
        run: just lint-clippy-embedded

  reuse:
    name: REUSE Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Check REUSE compliance
        run: uvx reuse lint

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Cache itur wheel
        uses: actions/cache@v5
        with:
          path: itur-0.4.0-py2.py3-none-any.whl
          key: itur-wheel-0.4.0
      - name: Download itur wheel (if not cached)
        run: |
          test -f itur-0.4.0-py2.py3-none-any.whl \
            || python3 -m pip download --no-deps itur==0.4.0
      - name: Build lox-itur data bundle
        run: cargo run -p lox-itur --bin pack -- itur-0.4.0-py2.py3-none-any.whl target/lox-itur-data.npz
      - name: Generate code coverage
        run: uv run --no-project tools/coverage.py --codecov --output-path codecov.json
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # not required for public repos
          files: codecov.json,coverage.xml
          fail_ci_if_error: true
