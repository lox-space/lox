[project]
site_name = "Lox Python"
site_url = "https://python.lox.rs"
site_description = "An astrodynamics library for orbital mechanics, mission analysis, and telecommunications"
site_author = "Helge Eichhorn"
repo_url = "https://github.com/lox-space/lox"
docs_dir = "crates/lox-space/docs"
site_dir = "crates/lox-space/site"
nav = [
    { "Home" = "index.md" },
    { "API Reference" = [
        { "Time & Dates" = "time.md" },
        { "Celestial Bodies" = "bodies.md" },
        { "Reference Frames" = "frames.md" },
        { "Orbital States" = "states.md" },
        { "Propagators" = "propagators.md" },
        { "Ground Stations" = "ground.md" },
        { "Events & Visibility" = "events.md" },
        { "Coverage" = "coverage.md" },
        { "Communications" = "comms.md" },
        { "Atmospheric Propagation" = "itur.md" },
        { "Constellations" = "constellations.md" },
        { "Data Providers" = "data.md" },
        { "Units" = "units.md" },
    ]},
]

[project.theme]
variant = "modern"

[project.theme.palette]
scheme = "slate"
primary = "indigo"

[project.theme.features]
toc.integrate = true

[project.markdown_extensions.pymdownx.highlight]

[project.markdown_extensions.pymdownx.superfences]

[project.plugins.autorefs]

[project.plugins.mkdocstrings.handlers.python]
inventories = [
    "https://docs.python.org/3/objects.inv",
]

[project.plugins.mkdocstrings.handlers.python.options]
# DOCSTRINGS
docstring_section_style = "list"

# CROSS-REFERENCES
signature_crossrefs = true
unwrap_annotated = true

# MEMBERS
inherited_members = true
summary = true

# HEADINGS
heading_level = 2
parameter_headings = true
type_parameter_headings = true
show_root_heading = true
show_root_full_path = false
show_symbol_type_heading = true
show_symbol_type_toc = true

# SIGNATURES
line_length = 88
merge_init_into_class = true
separate_signature = true
show_signature_annotations = true
show_signature_type_parameters = true

# OTHER
show_bases = false

[project.plugins.mkdocstrings.handlers.python.options.docstring_options]
ignore_init_summary = true
warn_unknown_params = false
warn_missing_types = false
