pre-commit:
  parallel: true
  commands:
    spdx-headers:
      glob: "*.{rs,py,toml,md,yml,yaml,sh}"
      run: |
        python3 tools/add_spdx_headers.py {staged_files}
        git add {staged_files}
    rustfmt:
      glob: "*.rs"
      run: |
        cargo fmt -- {staged_files}
        git add {staged_files}

pre-push:
  parallel: true
  commands:
    reuse:
      run: just lint-reuse
    clippy:
      run: just lint-clippy
    rustfmt:
      run: just lint-rustfmt
